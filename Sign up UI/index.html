<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus — Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="16,2 30,26 2,26" stroke="currentColor" stroke-width="2" fill="none"/>
          <polygon points="16,10 24,24 8,24" fill="currentColor" opacity="0.4"/>
        </svg>
      </div>
      <span class="brand-name">Nexus</span>
    </div>

    <!-- Card -->
    <div class="card" id="authCard">

      <!-- Tab switcher -->
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <form class="auth-form active" id="loginForm" novalidate>
        <h2 class="form-title">Welcome back</h2>
        <p class="form-subtitle">Sign in to continue your journey</p>

        <div class="field-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><path d="M2 5l8 5 8-5M2 5h16v10H2V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </span>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
            <span class="input-status"></span>
          </div>
          <span class="error-msg" id="loginEmailErr"></span>
        </div>

        <div class="field-group">
          <label for="loginPassword">Password
            <a href="#" class="label-link" tabindex="-1">Forgot password?</a>
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><rect x="4" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="13" r="1.2" fill="currentColor"/></svg>
            </span>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" data-target="loginPassword" aria-label="Toggle password">
              <svg class="eye-open" viewBox="0 0 20 20" fill="none"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
              <svg class="eye-closed hidden" viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M8.5 8.7A2.5 2.5 0 0112.8 12M5.5 5.8C3.5 7 2 9 2 9s3 5.5 8 5.5c1.3 0 2.5-.3 3.5-.8M10 4.5C14.5 4.5 18 9 18 9s-.8 1.3-2 2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
          <span class="error-msg" id="loginPasswordErr"></span>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"/>
            <span class="checkbox-custom"></span>
            Remember me for 30 days
          </label>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn" data-clicked="false">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none"></span>
        </button>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-row">
          <button type="button" class="btn-social">
            <svg viewBox="0 0 20 20"><path d="M18.17 10.23c0-.63-.06-1.25-.16-1.84H10v3.48h4.58a3.9 3.9 0 01-1.7 2.57v2.13h2.76c1.61-1.49 2.54-3.68 2.54-6.34z" fill="#4285F4"/><path d="M10 18.5c2.3 0 4.23-.76 5.64-2.06l-2.76-2.13c-.77.51-1.74.82-2.88.82-2.21 0-4.08-1.49-4.75-3.5H2.39v2.2A8.5 8.5 0 0010 18.5z" fill="#34A853"/><path d="M5.25 11.63A5.1 5.1 0 015 10c0-.56.1-1.1.25-1.62V6.18H2.39A8.5 8.5 0 001.5 10c0 1.37.33 2.67.9 3.82l2.85-2.19z" fill="#FBBC05"/><path d="M10 4.88c1.25 0 2.36.43 3.24 1.27l2.43-2.43C14.23 2.34 12.3 1.5 10 1.5A8.5 8.5 0 002.39 6.18l2.86 2.2C5.92 6.37 7.79 4.88 10 4.88z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="btn-social">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 1.5C5.3 1.5 1.5 5.3 1.5 10c0 3.75 2.44 6.93 5.83 8.05.43.08.58-.19.58-.41v-1.44c-2.38.52-2.88-1.15-2.88-1.15-.39-1-.95-1.26-.95-1.26-.77-.53.06-.52.06-.52.86.06 1.31.88 1.31.88.76 1.3 2 .93 2.48.71.08-.55.3-.93.54-1.14-1.9-.22-3.9-.95-3.9-4.23 0-.93.33-1.7.88-2.3-.09-.22-.38-1.09.08-2.27 0 0 .72-.23 2.36.88A8.2 8.2 0 0110 6.08c.73 0 1.47.1 2.16.29 1.63-1.11 2.35-.88 2.35-.88.47 1.18.17 2.05.09 2.27.55.6.88 1.37.88 2.3 0 3.29-2 4.01-3.92 4.22.31.27.58.8.58 1.61v2.38c0 .23.15.5.59.41A8.5 8.5 0 0018.5 10C18.5 5.3 14.7 1.5 10 1.5z"/></svg>
            GitHub
          </button>
        </div>
      </form>

      <!-- SIGNUP FORM-->
      <form class="auth-form" id="signupForm" novalidate>
        <h2 class="form-title">Create account</h2>
        <p class="form-subtitle">Join thousands already using Nexus</p>

        <div class="two-col">
          <div class="field-group">
            <label for="signupFirst">First Name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </span>
              <input type="text" id="signupFirst" placeholder="Jane" autocomplete="given-name"/>
              <span class="input-status"></span>
            </div>
            <span class="error-msg" id="signupFirstErr"></span>
          </div>

          <div class="field-group">
            <label for="signupLast">Last Name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </span>
              <input type="text" id="signupLast" placeholder="Doe" autocomplete="family-name"/>
              <span class="input-status"></span>
            </div>
            <span class="error-msg" id="signupLastErr"></span>
          </div>
        </div>

        <div class="field-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><path d="M2 5l8 5 8-5M2 5h16v10H2V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </span>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
            <span class="input-status"></span>
          </div>
          <span class="error-msg" id="signupEmailErr"></span>
        </div>

        <div class="field-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><rect x="4" y="8" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="13" r="1.2" fill="currentColor"/></svg>
            </span>
            <input type="password" id="signupPassword" placeholder="Create a strong password" autocomplete="new-password"/>
            <button type="button" class="toggle-pw" data-target="signupPassword" aria-label="Toggle password">
              <svg class="eye-open" viewBox="0 0 20 20" fill="none"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
              <svg class="eye-closed hidden" viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M8.5 8.7A2.5 2.5 0 0112.8 12M5.5 5.8C3.5 7 2 9 2 9s3 5.5 8 5.5c1.3 0 2.5-.3 3.5-.8M10 4.5C14.5 4.5 18 9 18 9s-.8 1.3-2 2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
          <span class="error-msg" id="signupPasswordErr"></span>
          <!-- Password strength meter -->
          <div class="strength-meter" id="strengthMeter">
            <div class="strength-bars">
              <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
            <span class="strength-label" id="strengthLabel">Strength</span>
          </div>
          <!-- Password requirements checklist -->
          <ul class="pw-requirements" id="pwRequirements">
            <li data-rule="length">At least 8 characters</li>
            <li data-rule="uppercase">One uppercase letter</li>
            <li data-rule="number">One number</li>
            <li data-rule="special">One special character (!@#$…)</li>
          </ul>
        </div>

        <div class="field-group">
          <label for="signupConfirm">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><path d="M9 11l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
            </span>
            <input type="password" id="signupConfirm" placeholder="Repeat your password" autocomplete="new-password"/>
            <span class="input-status"></span>
          </div>
          <span class="error-msg" id="signupConfirmErr"></span>
        </div>

        <div class="field-group">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms"/>
            <span class="checkbox-custom"></span>
            I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a>
          </label>
          <span class="error-msg" id="agreeTermsErr"></span>
        </div>

        <button type="submit" class="btn-primary" id="signupBtn" data-clicked="false">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" style="display:none"></span>
        </button>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-row">
          <button type="button" class="btn-social">
            <svg viewBox="0 0 20 20"><path d="M18.17 10.23c0-.63-.06-1.25-.16-1.84H10v3.48h4.58a3.9 3.9 0 01-1.7 2.57v2.13h2.76c1.61-1.49 2.54-3.68 2.54-6.34z" fill="#4285F4"/><path d="M10 18.5c2.3 0 4.23-.76 5.64-2.06l-2.76-2.13c-.77.51-1.74.82-2.88.82-2.21 0-4.08-1.49-4.75-3.5H2.39v2.2A8.5 8.5 0 0010 18.5z" fill="#34A853"/><path d="M5.25 11.63A5.1 5.1 0 015 10c0-.56.1-1.1.25-1.62V6.18H2.39A8.5 8.5 0 001.5 10c0 1.37.33 2.67.9 3.82l2.85-2.19z" fill="#FBBC05"/><path d="M10 4.88c1.25 0 2.36.43 3.24 1.27l2.43-2.43C14.23 2.34 12.3 1.5 10 1.5A8.5 8.5 0 002.39 6.18l2.86 2.2C5.92 6.37 7.79 4.88 10 4.88z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="btn-social">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 1.5C5.3 1.5 1.5 5.3 1.5 10c0 3.75 2.44 6.93 5.83 8.05.43.08.58-.19.58-.41v-1.44c-2.38.52-2.88-1.15-2.88-1.15-.39-1-.95-1.26-.95-1.26-.77-.53.06-.52.06-.52.86.06 1.31.88 1.31.88.76 1.3 2 .93 2.48.71.08-.55.3-.93.54-1.14-1.9-.22-3.9-.95-3.9-4.23 0-.93.33-1.7.88-2.3-.09-.22-.38-1.09.08-2.27 0 0 .72-.23 2.36.88A8.2 8.2 0 0110 6.08c.73 0 1.47.1 2.16.29 1.63-1.11 2.35-.88 2.35-.88.47 1.18.17 2.05.09 2.27.55.6.88 1.37.88 2.3 0 3.29-2 4.01-3.92 4.22.31.27.58.8.58 1.61v2.38c0 .23.15.5.59.41A8.5 8.5 0 0018.5 10C18.5 5.3 14.7 1.5 10 1.5z"/></svg>
            GitHub
          </button>
        </div>
      </form>

    </div><!-- /card -->

    <p class="footer-note">© 2025 Nexus Inc. · <a href="#">Privacy</a> · <a href="#">Terms</a></p>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <span class="toast-icon"></span>
    <span class="toast-msg" id="toastMsg"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
